<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background: deep navy (traffic card) -->
  <rect width="160" height="100" fill="#001828"/>

  <!-- Drawing area: 32×32 virtual grid, centered -->
  <g transform="translate(30,0) scale(3.125)">
    <!-- ── Distributed attack packets (4 amber streams, pointing down) ── -->

    <!-- Arrow 1 (cx=5, tall – outer left): shaft then taper to tip -->
    <rect x="4"  y="0" width="2" height="4" fill="#ff9500"/>
    <rect x="2"  y="4" width="6" height="1" fill="#ff9500"/>
    <rect x="3"  y="5" width="4" height="1" fill="#ff9500"/>
    <rect x="4"  y="6" width="2" height="1" fill="#ff9500"/>

    <!-- Arrow 2 (cx=12, short – inner left) -->
    <rect x="11" y="0" width="2" height="2" fill="#ff9500"/>
    <rect x="9"  y="2" width="6" height="1" fill="#ff9500"/>
    <rect x="10" y="3" width="4" height="1" fill="#ff9500"/>
    <rect x="11" y="4" width="2" height="1" fill="#ff9500"/>

    <!-- Arrow 3 (cx=20, short – inner right) -->
    <rect x="19" y="0" width="2" height="2" fill="#ff9500"/>
    <rect x="17" y="2" width="6" height="1" fill="#ff9500"/>
    <rect x="18" y="3" width="4" height="1" fill="#ff9500"/>
    <rect x="19" y="4" width="2" height="1" fill="#ff9500"/>

    <!-- Arrow 4 (cx=26, tall – outer right) -->
    <rect x="25" y="0" width="2" height="4" fill="#ff9500"/>
    <rect x="23" y="4" width="6" height="1" fill="#ff9500"/>
    <rect x="24" y="5" width="4" height="1" fill="#ff9500"/>
    <rect x="25" y="6" width="2" height="1" fill="#ff9500"/>

    <!-- ── Server rack: isometric 3-face box ─────────────────────────── -->
    <!-- Top face -->
    <polygon points="7,13 25,13 27,11 9,11" fill="#005577"/>
    <!-- Right side face -->
    <polygon points="25,13 27,11 27,21 25,21" fill="#002244"/>
    <!-- Front face -->
    <rect x="7" y="13" width="18" height="8" fill="#003355"/>
    <!-- Mounting ears -->
    <rect x="7"  y="13" width="2" height="8" fill="#002244"/>
    <rect x="23" y="13" width="2" height="8" fill="#002244"/>
    <!-- Amber top-edge highlight (DDoS load — not cyan) -->
    <rect x="7" y="13" width="18" height="1" fill="#ff9500" opacity="0.35"/>

    <!-- Status LEDs (3 red + 2 amber — server overloaded) -->
    <rect x="9"  y="16" width="2" height="2" fill="#ff3b30"/>
    <rect x="12" y="16" width="2" height="2" fill="#ff9500"/>
    <rect x="15" y="16" width="2" height="2" fill="#ff3b30"/>
    <rect x="18" y="16" width="2" height="2" fill="#ff3b30"/>
    <rect x="21" y="16" width="2" height="2" fill="#ff9500"/>

    <!-- Port slots (bottom of front face) -->
    <rect x="9"  y="19" width="3" height="2" fill="#001122"/>
    <rect x="13" y="19" width="3" height="2" fill="#001122"/>
    <rect x="17" y="19" width="3" height="2" fill="#001122"/>
    <rect x="21" y="19" width="2" height="2" fill="#001122"/>

    <!-- ── Atmospheric scanlines (amber, bottom) ─────────────────────── -->
    <rect x="4" y="25" width="24" height="1" fill="#ff9500" opacity="0.15"/>
    <rect x="4" y="27" width="24" height="1" fill="#ff9500" opacity="0.10"/>
    <rect x="4" y="29" width="24" height="1" fill="#ff9500" opacity="0.06"/>
  </g>
</svg>
