<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="160" height="100" fill="#001505"/>

  <!-- Drawing area: 32×32 virtual grid, centered -->
  <g transform="translate(30,0) scale(3.125)">

    <!-- ── Server Rack ─────────────────────────────── -->
    <!-- Isometric top face -->
    <polygon points="2,11 26,11 28,9 4,9" fill="#1a6b30"/>
    <!-- Right side face -->
    <polygon points="26,11 28,9 28,22 26,22" fill="#0c4a1f"/>
    <!-- Front face -->
    <rect x="2" y="11" width="24" height="11" fill="#145520"/>
    <!-- Mounting ears -->
    <rect x="2"  y="11" width="2" height="11" fill="#0c4a1f"/>
    <rect x="24" y="11" width="2" height="11" fill="#0c4a1f"/>
    <!-- Top-edge highlight -->
    <rect x="2"  y="11" width="24" height="1"  fill="#30d158" opacity="0.35"/>

    <!-- Status LEDs — all green (secured) -->
    <rect x="5"  y="14" width="2" height="2" fill="#30d158"/>
    <rect x="8"  y="14" width="2" height="2" fill="#30d158"/>
    <rect x="11" y="14" width="2" height="2" fill="#30d158"/>
    <rect x="14" y="14" width="2" height="2" fill="#30d158"/>
    <rect x="17" y="14" width="2" height="2" fill="#30d158"/>
    <rect x="20" y="14" width="2" height="2" fill="#30d158" opacity="0.5"/>

    <!-- Port slots (bottom of front face) -->
    <rect x="5"  y="17" width="3" height="3" fill="#0a3810"/>
    <rect x="9"  y="17" width="3" height="3" fill="#0a3810"/>
    <rect x="13" y="17" width="3" height="3" fill="#0a3810"/>
    <rect x="17" y="17" width="3" height="3" fill="#0a3810"/>
    <rect x="21" y="17" width="3" height="3" fill="#0a3810"/>

    <!-- ── Shield (badge) — drawn after rack so it renders on top ── -->
    <!-- Outline: top edge + left/right sides + bottom bar -->
    <rect x="18" y="6"  width="12" height="1" fill="#30d158"/>
    <rect x="18" y="7"  width="1"  height="6" fill="#30d158"/>
    <rect x="29" y="7"  width="1"  height="6" fill="#30d158"/>
    <rect x="18" y="12" width="12" height="1" fill="#30d158"/>
    <!-- Taper rows to pointed tip — edges outline, interior matches shield bg -->
    <rect x="19" y="13" width="1" height="1" fill="#30d158"/><rect x="20" y="13" width="8" height="1" fill="#0a2a14"/><rect x="28" y="13" width="1" height="1" fill="#30d158"/>
    <rect x="20" y="14" width="1" height="1" fill="#30d158"/><rect x="21" y="14" width="6" height="1" fill="#0a2a14"/><rect x="27" y="14" width="1" height="1" fill="#30d158"/>
    <rect x="21" y="15" width="1" height="1" fill="#30d158"/><rect x="22" y="15" width="4" height="1" fill="#0a2a14"/><rect x="26" y="15" width="1" height="1" fill="#30d158"/>
    <rect x="22" y="16" width="1" height="1" fill="#30d158"/><rect x="23" y="16" width="2" height="1" fill="#0a2a14"/><rect x="25" y="16" width="1" height="1" fill="#30d158"/>
    <rect x="23" y="17" width="2" height="1" fill="#30d158"/>
    <!-- Interior fill -->
    <rect x="19" y="7"  width="10" height="6" fill="#0a2a14"/>

    <!-- ── Padlock icon (inside shield) ──────────────── -->
    <!-- Shackle: U-shape above body -->
    <rect x="22" y="8"  width="4"  height="1" fill="#30d158"/>
    <rect x="22" y="9"  width="1"  height="2" fill="#30d158"/>
    <rect x="25" y="9"  width="1"  height="2" fill="#30d158"/>
    <!-- Lock body -->
    <rect x="21" y="10" width="6"  height="3" fill="#30d158"/>
    <!-- Keyhole (punches through body) -->
    <rect x="23" y="11" width="2"  height="1" fill="#0a2a14"/>

    <!-- ── Atmospheric scanlines ───────────────────── -->
    <rect x="3" y="23" width="24" height="1" fill="#30d158" opacity="0.15"/>
    <rect x="3" y="25" width="24" height="1" fill="#30d158" opacity="0.10"/>

  </g>
</svg>
