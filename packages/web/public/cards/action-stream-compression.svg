<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="160" height="100" fill="#001505"/>

  <!-- Drawing area: 32×32 virtual grid, centered -->
  <g transform="translate(30,0) scale(3.125)">

    <!-- ── Server rack (drawn first so arrows overlay it) ── -->
    <!-- Top face (isometric) -->
    <polygon points="3,23 27,23 29,21 5,21" fill="#1a6b30"/>
    <!-- Right side face -->
    <polygon points="27,23 29,21 29,31 27,31" fill="#0c4a1f"/>
    <!-- Front face -->
    <rect x="3" y="23" width="24" height="8" fill="#145520"/>
    <!-- Mounting ears -->
    <rect x="3"  y="23" width="2" height="8" fill="#0c4a1f"/>
    <rect x="25" y="23" width="2" height="8" fill="#0c4a1f"/>
    <!-- Top-edge highlight -->
    <rect x="3" y="23" width="24" height="1" fill="#30d158" opacity="0.35"/>
    <!-- Status LEDs -->
    <rect x="7"  y="25" width="2" height="2" fill="#30d158"/>
    <rect x="11" y="25" width="2" height="2" fill="#30d158" opacity="0.6"/>
    <rect x="15" y="25" width="2" height="2" fill="#30d158"/>
    <rect x="19" y="25" width="2" height="2" fill="#30d158"/>
    <!-- Port slots -->
    <rect x="6"  y="29" width="3" height="2" fill="#0a3810"/>
    <rect x="10" y="29" width="3" height="2" fill="#0a3810"/>
    <rect x="14" y="29" width="3" height="2" fill="#0a3810"/>
    <rect x="18" y="29" width="3" height="2" fill="#0a3810"/>
    <rect x="22" y="29" width="2" height="2" fill="#0a3810"/>

    <!-- ── Left input shaft (tall) ─────────────────── -->
    <rect x="8" y="0" width="2" height="7" fill="#30d158"/>

    <!-- ── Left arrowhead (DOWN: wide top → narrow tip at bottom) ── -->
    <rect x="5" y="7"  width="8" height="1" fill="#30d158"/>
    <rect x="6" y="8"  width="6" height="1" fill="#30d158"/>
    <rect x="7" y="9"  width="4" height="1" fill="#30d158"/>
    <rect x="8" y="10" width="2" height="1" fill="#30d158"/>

    <!-- ── Right input shaft (tall) ────────────────── -->
    <rect x="21" y="0" width="2" height="7" fill="#30d158"/>

    <!-- ── Right arrowhead (DOWN) ─────────────────── -->
    <rect x="18" y="7"  width="8" height="1" fill="#30d158"/>
    <rect x="19" y="8"  width="6" height="1" fill="#30d158"/>
    <rect x="20" y="9"  width="4" height="1" fill="#30d158"/>
    <rect x="21" y="10" width="2" height="1" fill="#30d158"/>

    <!-- ── Left diagonal (3 rows, steep) ─────────── -->
    <rect x="10" y="11" width="3" height="2" fill="#30d158"/>
    <rect x="12" y="12" width="3" height="2" fill="#30d158"/>
    <rect x="13" y="13" width="3" height="2" fill="#30d158"/>

    <!-- ── Right diagonal (3 rows, steep) ────────── -->
    <rect x="19" y="11" width="3" height="2" fill="#30d158"/>
    <rect x="17" y="12" width="3" height="2" fill="#30d158"/>
    <rect x="15" y="13" width="3" height="2" fill="#30d158"/>

    <!-- ── Merged shaft (4px wide, tall) ─────────── -->
    <rect x="14" y="14" width="4" height="5" fill="#30d158"/>

    <!-- ── Merged arrowhead (DOWN — lands on server top face) ── -->
    <rect x="11" y="19" width="10" height="1" fill="#30d158"/>
    <rect x="12" y="20" width="8"  height="1" fill="#30d158"/>
    <rect x="13" y="21" width="6"  height="1" fill="#30d158"/>

  </g>
</svg>
