<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" shape-rendering="crispEdges">
  <!-- Vendor card background: dark amber-black -->
  <rect width="160" height="100" fill="#110d00"/>

  <g transform="translate(30,0) scale(3.125)">
    <!-- ── North satellite node (4×3) ── -->
    <rect x="13" y="2"  width="4" height="3" fill="#ffd60a" fill-opacity="0.75"/>
    <!-- North wire (2×7) -->
    <rect x="14" y="5"  width="2" height="7" fill="#ffd60a" fill-opacity="0.40"/>
    <!-- packet dot midway on north wire -->
    <rect x="15" y="8"  width="1" height="1" fill="#ffd60a" fill-opacity="0.80"/>

    <!-- ── West satellite node (3×4) ── -->
    <rect x="1"  y="12" width="3" height="4" fill="#ffd60a" fill-opacity="0.75"/>
    <!-- West wire (9×2) -->
    <rect x="4"  y="13" width="9" height="2" fill="#ffd60a" fill-opacity="0.40"/>
    <!-- packet dot midway on west wire -->
    <rect x="8"  y="14" width="1" height="1" fill="#ffd60a" fill-opacity="0.80"/>

    <!-- ── Central hub node (4×4, full brightness) ── -->
    <rect x="13" y="12" width="4" height="4" fill="#ffd60a"/>
    <!-- hub highlight pixel -->
    <rect x="13" y="12" width="2" height="1" fill="#fff8cc" fill-opacity="0.60"/>

    <!-- ── East satellite node (3×4) ── -->
    <rect x="26" y="12" width="3" height="4" fill="#ffd60a" fill-opacity="0.75"/>
    <!-- East wire (9×2) -->
    <rect x="17" y="13" width="9" height="2" fill="#ffd60a" fill-opacity="0.40"/>
    <!-- packet dot midway on east wire -->
    <rect x="21" y="14" width="1" height="1" fill="#ffd60a" fill-opacity="0.80"/>

    <!-- ── South satellite node (4×3) ── -->
    <rect x="13" y="22" width="4" height="3" fill="#ffd60a" fill-opacity="0.75"/>
    <!-- South wire (2×6) -->
    <rect x="14" y="16" width="2" height="6" fill="#ffd60a" fill-opacity="0.40"/>
    <!-- packet dot midway on south wire -->
    <rect x="15" y="19" width="1" height="1" fill="#ffd60a" fill-opacity="0.80"/>

    <!-- ── Atmospheric scanlines ── -->
    <rect x="0" y="27" width="32" height="1" fill="#ffd60a" fill-opacity="0.06"/>
    <rect x="0" y="29" width="32" height="1" fill="#ffd60a" fill-opacity="0.04"/>
    <rect x="0" y="31" width="32" height="1" fill="#ffd60a" fill-opacity="0.03"/>
  </g>
</svg>
