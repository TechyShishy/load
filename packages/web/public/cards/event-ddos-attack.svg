<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background: deep crimson -->
  <rect width="160" height="100" fill="#1a0000"/>

  <!-- Drawing area: 100×100 square centered (30px margin each side) -->
  <g transform="translate(30,0) scale(3.125)">
    <!-- ── Attack arrows (3 streams, staggered heights) ────────────────── -->

    <!-- Left stream (center x=6) -->
    <rect x="5" y="1" width="2" height="4" fill="#ff3b30"/>
    <rect x="4" y="5" width="4" height="1" fill="#ff3b30"/>
    <rect x="3" y="6" width="6" height="1" fill="#ff3b30"/>
    <rect x="4" y="7" width="4" height="1" fill="#ff3b30"/>
    <rect x="5" y="8" width="2" height="1" fill="#ff3b30"/>

    <!-- Center stream (center x=16) -->
    <rect x="15" y="0" width="2" height="5" fill="#ff3b30"/>
    <rect x="14" y="5" width="4" height="1" fill="#ff3b30"/>
    <rect x="13" y="6" width="6" height="1" fill="#ff3b30"/>
    <rect x="14" y="7" width="4" height="1" fill="#ff3b30"/>
    <rect x="15" y="8" width="2" height="1" fill="#ff3b30"/>

    <!-- Right stream (center x=26) -->
    <rect x="25" y="2" width="2" height="4" fill="#ff3b30"/>
    <rect x="24" y="6" width="4" height="1" fill="#ff3b30"/>
    <rect x="23" y="7" width="6" height="1" fill="#ff3b30"/>
    <rect x="24" y="8" width="4" height="1" fill="#ff3b30"/>
    <rect x="25" y="9" width="2" height="1" fill="#ff3b30"/>

    <!-- ── Server rack: isometric 3-face box ──────────────────────────── -->
    <!-- Top face -->
    <polygon points="7,13 25,13 27,11 9,11" fill="#4a0a0a"/>
    <!-- Right side face -->
    <polygon points="25,13 27,11 27,21 25,21" fill="#2d0606"/>
    <!-- Front face -->
    <rect x="7" y="13" width="18" height="8" fill="#3b0808"/>
    <!-- Mounting ears -->
    <rect x="7"  y="13" width="2" height="8" fill="#2d0606"/>
    <rect x="23" y="13" width="2" height="8" fill="#2d0606"/>
    <!-- Front face top highlight (subtle) -->
    <rect x="7" y="13" width="18" height="1" fill="#ff453a" opacity="0.35"/>

    <!-- Status LEDs (5 ports — all red under attack, one amber warning) -->
    <rect x="9"  y="16" width="2" height="2" fill="#ff453a"/>
    <rect x="12" y="16" width="2" height="2" fill="#ff453a"/>
    <rect x="15" y="16" width="2" height="2" fill="#ffd60a"/>
    <rect x="18" y="16" width="2" height="2" fill="#ff453a"/>
    <rect x="21" y="16" width="2" height="2" fill="#ff453a"/>

    <!-- Port slots (bottom of front face) -->
    <rect x="9"  y="19" width="3" height="2" fill="#1a0303"/>
    <rect x="13" y="19" width="3" height="2" fill="#1a0303"/>
    <rect x="17" y="19" width="3" height="2" fill="#1a0303"/>
    <rect x="21" y="19" width="3" height="2" fill="#1a0303"/>

    <!-- ── Impact burst crosses (where arrows hit the server top) ─────── -->
    <!-- Left impact (x=6) -->
    <rect x="5"  y="10" width="4" height="1" fill="#ff6961" opacity="0.85"/>
    <rect x="6"  y="9"  width="2" height="3" fill="#ff6961" opacity="0.85"/>
    <!-- Center impact (x=16) -->
    <rect x="14" y="10" width="4" height="1" fill="#ff6961" opacity="0.85"/>
    <rect x="15" y="9"  width="2" height="3" fill="#ff6961" opacity="0.85"/>
    <!-- Right impact (x=25) — on the isometric top-right edge, slightly left -->
    <rect x="23" y="10" width="4" height="1" fill="#ff6961" opacity="0.85"/>
    <rect x="24" y="9"  width="2" height="3" fill="#ff6961" opacity="0.85"/>

    <!-- ── Flood scan lines (atmospheric, bottom) ─────────────────────── -->
    <rect x="4" y="25" width="24" height="1" fill="#ff3b30" opacity="0.18"/>
    <rect x="4" y="27" width="24" height="1" fill="#ff3b30" opacity="0.12"/>
    <rect x="4" y="29" width="24" height="1" fill="#ff3b30" opacity="0.07"/>
  </g>
</svg>
