<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background: deep navy -->
  <rect width="160" height="100" fill="#001828"/>

  <!-- Drawing area: 32×32 virtual grid, centered -->
  <g transform="translate(30,0) scale(3.125)">

    <!-- ── IoT device cube: LEFT (x=4, y=6) ─────────────────────────── -->
    <!-- Top face -->
    <polygon points="4,6 10,6 11,5 5,5" fill="#005577"/>
    <!-- Right side face -->
    <polygon points="10,6 11,5 11,9 10,9" fill="#002244"/>
    <!-- Front face -->
    <rect x="4" y="6" width="6" height="3" fill="#003355"/>
    <!-- Status LED -->
    <rect x="6" y="7" width="2" height="1" fill="#00f5ff"/>

    <!-- ── IoT device cube: CENTER (x=12, y=3) ──────────────────────── -->
    <!-- Top face -->
    <polygon points="12,3 18,3 19,2 13,2" fill="#005577"/>
    <!-- Right side face -->
    <polygon points="18,3 19,2 19,6 18,6" fill="#002244"/>
    <!-- Front face -->
    <rect x="12" y="3" width="6" height="3" fill="#003355"/>
    <!-- Status LED -->
    <rect x="14" y="4" width="2" height="1" fill="#00f5ff"/>

    <!-- ── IoT device cube: RIGHT (x=21, y=6) ───────────────────────── -->
    <!-- Top face -->
    <polygon points="21,6 27,6 28,5 22,5" fill="#005577"/>
    <!-- Right side face -->
    <polygon points="27,6 28,5 28,9 27,9" fill="#002244"/>
    <!-- Front face -->
    <rect x="21" y="6" width="6" height="3" fill="#003355"/>
    <!-- Status LED -->
    <rect x="23" y="7" width="2" height="1" fill="#00f5ff"/>

    <!-- ── Down arrow: LEFT (center x=7, shaft y=9–12) ───────────────── -->
    <rect x="6"  y="9"  width="2" height="4" fill="#00f5ff"/>
    <!-- Arrowhead -->
    <rect x="3"  y="13" width="8" height="1" fill="#00f5ff"/>
    <rect x="4"  y="14" width="6" height="1" fill="#00f5ff"/>
    <rect x="5"  y="15" width="4" height="1" fill="#00f5ff"/>

    <!-- ── Down arrow: CENTER (center x=15, shaft y=6–12) ───────────── -->
    <rect x="14" y="6"  width="2" height="7" fill="#00f5ff"/>
    <!-- Arrowhead -->
    <rect x="11" y="13" width="8" height="1" fill="#00f5ff"/>
    <rect x="12" y="14" width="6" height="1" fill="#00f5ff"/>
    <rect x="13" y="15" width="4" height="1" fill="#00f5ff"/>

    <!-- ── Down arrow: RIGHT (center x=24, shaft y=9–12) ────────────── -->
    <rect x="23" y="9"  width="2" height="4" fill="#00f5ff"/>
    <!-- Arrowhead -->
    <rect x="20" y="13" width="8" height="1" fill="#00f5ff"/>
    <rect x="21" y="14" width="6" height="1" fill="#00f5ff"/>
    <rect x="22" y="15" width="4" height="1" fill="#00f5ff"/>

    <!-- ── Isometric server rack (bottom, y=17–25) ───────────────────── -->
    <!-- Top face -->
    <polygon points="7,19 25,19 27,17 9,17" fill="#005577"/>
    <!-- Right side face -->
    <polygon points="25,19 27,17 27,25 25,25" fill="#002244"/>
    <!-- Front face -->
    <rect x="7" y="19" width="18" height="6" fill="#003355"/>
    <!-- Mounting ears -->
    <rect x="7"  y="19" width="2" height="6" fill="#002244"/>
    <rect x="23" y="19" width="2" height="6" fill="#002244"/>
    <!-- Top-edge highlight — all ports saturated by IoT burst -->
    <rect x="7" y="19" width="18" height="1" fill="#00f5ff" opacity="0.35"/>
    <!-- Status LEDs — all 5 at full brightness (saturated) -->
    <rect x="9"  y="22" width="2" height="2" fill="#00f5ff"/>
    <rect x="12" y="22" width="2" height="2" fill="#00f5ff"/>
    <rect x="15" y="22" width="2" height="2" fill="#00f5ff"/>
    <rect x="18" y="22" width="2" height="2" fill="#00f5ff"/>
    <rect x="21" y="22" width="2" height="2" fill="#00f5ff"/>
    <!-- Port slots -->
    <rect x="9"  y="24" width="3" height="1" fill="#001828"/>
    <rect x="13" y="24" width="3" height="1" fill="#001828"/>
    <rect x="17" y="24" width="3" height="1" fill="#001828"/>

    <!-- ── Atmospheric scanlines ─────────────────────────────────────── -->
    <rect x="4" y="28" width="24" height="1" fill="#00f5ff" opacity="0.12"/>
    <rect x="4" y="30" width="24" height="1" fill="#00f5ff" opacity="0.07"/>

  </g>
</svg>
