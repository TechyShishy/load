<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background — dark green-black -->
  <rect width="160" height="100" fill="#001505"/>

  <!-- Drawing area: 32×32 virtual grid, centered -->
  <g transform="translate(30,0) scale(3.125)">

    <!-- ── Secondary (standby) rack — faint, behind primary ── -->
    <!-- Top face — staircase rows, 1px each, no polygon -->
    <rect x="4" y="7" width="26" height="1" fill="#0d3318"/>
    <rect x="3" y="8" width="26" height="1" fill="#0d3318"/>
    <!-- Right side face — staircase steps then full column -->
    <rect x="30" y="7"  width="1" height="1" fill="#071a0c"/>
    <rect x="29" y="8"  width="2" height="1" fill="#071a0c"/>
    <rect x="28" y="9"  width="2" height="12" fill="#071a0c"/>
    <!-- Front face -->
    <rect x="2" y="9" width="26" height="11" fill="#0a2810"/>
    <!-- Faint status strips -->
    <rect x="4" y="11" width="16" height="1" fill="#123d1a" opacity="0.6"/>
    <rect x="4" y="13" width="16" height="1" fill="#123d1a" opacity="0.6"/>
    <!-- Faint LEDs — amber (system idle) -->
    <rect x="22" y="11" width="2" height="2" fill="#4a3000" opacity="0.7"/>
    <rect x="22" y="14" width="2" height="2" fill="#4a3000" opacity="0.7"/>

    <!-- ── Primary rack (foreground) ── -->
    <!-- Top face — staircase rows, 1px each, no polygon -->
    <rect x="4" y="15" width="26" height="1" fill="#1a6b30"/>
    <rect x="3" y="16" width="26" height="1" fill="#1a6b30"/>
    <!-- Right side face — staircase steps then full column -->
    <rect x="30" y="15" width="1" height="1" fill="#0a3518"/>
    <rect x="29" y="16" width="2" height="1" fill="#0a3518"/>
    <rect x="28" y="17" width="2" height="12" fill="#0a3518"/>
    <!-- Front face -->
    <rect x="2" y="17" width="26" height="11" fill="#145520"/>
    <!-- Mounting ears -->
    <rect x="2" y="17" width="2" height="11" fill="#0a3518"/>
    <rect x="26" y="17" width="2" height="11" fill="#0a3518"/>
    <!-- Top-edge highlight -->
    <rect x="2" y="17" width="26" height="1" fill="#30d158" opacity="0.35"/>

    <!-- Port rows (4 ports) -->
    <rect x="4"  y="24" width="4" height="2" fill="#001505"/>
    <rect x="9"  y="24" width="4" height="2" fill="#001505"/>
    <rect x="14" y="24" width="4" height="2" fill="#001505"/>
    <rect x="19" y="24" width="4" height="2" fill="#001505"/>

    <!-- Activity lines -->
    <rect x="4" y="20" width="14" height="1" fill="#1a6b30"/>
    <rect x="4" y="22" width="10" height="1" fill="#1a6b30"/>

    <!-- ── Status LEDs — bright green (READY) ── -->
    <rect x="22" y="19" width="2" height="2" fill="#30d158"/>
    <rect x="22" y="22" width="2" height="2" fill="#30d158"/>
    <!-- Glow halo around top LED -->
    <rect x="21" y="18" width="4" height="4" fill="#30d158" opacity="0.15"/>

    <!-- ── Atmospheric scanlines ── -->
    <rect x="2" y="29" width="28" height="1" fill="#30d158" opacity="0.12"/>
    <rect x="2" y="31" width="28" height="1" fill="#30d158" opacity="0.07"/>

  </g>
</svg>
