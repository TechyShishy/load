<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background: same deep navy as traffic-4k-stream -->
  <rect width="160" height="100" fill="#001828"/>

  <!-- Drawing area: 32×32 inner grid, centered (30px margin each side) -->
  <g transform="translate(30,0) scale(3.125)">

    <!-- ── Pixel-art cloud (top, y=1–9) ──────────────────────────────── -->
    <!-- Center peak -->
    <rect x="13" y="1" width="6"  height="2" fill="#00b8d4"/>
    <!-- Left bump -->
    <rect x="9"  y="2" width="5"  height="3" fill="#00b8d4"/>
    <!-- Right bump -->
    <rect x="18" y="2" width="5"  height="3" fill="#00b8d4"/>
    <!-- Main cloud body -->
    <rect x="8"  y="5" width="16" height="3" fill="#00b8d4"/>
    <!-- Bottom-left corner (gap at center for arrow entry) -->
    <rect x="9"  y="8" width="5"  height="1" fill="#00b8d4"/>
    <!-- Bottom-right corner -->
    <rect x="18" y="8" width="5"  height="1" fill="#00b8d4"/>
    <!-- Top highlight shine -->
    <rect x="14" y="1" width="4"  height="1" fill="#00f5ff" opacity="0.55"/>
    <rect x="10" y="2" width="3"  height="1" fill="#00f5ff" opacity="0.35"/>

    <!-- ── Upload arrow (center, y=9–16) ─────────────────────────────── -->
    <!-- Tip enters the cloud's open center gap at y=9 -->
    <rect x="15" y="9"  width="2" height="1" fill="#00f5ff"/>
    <!-- Arrowhead — widens downward -->
    <rect x="14" y="10" width="4" height="1" fill="#00f5ff"/>
    <rect x="13" y="11" width="6" height="1" fill="#00f5ff"/>
    <rect x="12" y="12" width="8" height="1" fill="#00f5ff"/>
    <!-- Stem -->
    <rect x="14" y="13" width="4" height="4" fill="#00f5ff" opacity="0.75"/>

    <!-- ── Isometric server rack (bottom, y=17–25) ────────────────────── -->
    <!-- Top face -->
    <polygon points="7,19 25,19 27,17 9,17" fill="#005577"/>
    <!-- Right side face -->
    <polygon points="25,19 27,17 27,25 25,25" fill="#002244"/>
    <!-- Front face -->
    <rect x="7" y="19" width="18" height="6" fill="#003355"/>
    <!-- Mounting ears -->
    <rect x="7"  y="19" width="2" height="6" fill="#002244"/>
    <rect x="23" y="19" width="2" height="6" fill="#002244"/>
    <!-- Top-edge highlight (subtle data activity) -->
    <rect x="7" y="19" width="18" height="1" fill="#00f5ff" opacity="0.35"/>
    <!-- Status LEDs — healthy, transferring -->
    <rect x="9"  y="22" width="2" height="2" fill="#00f5ff"/>
    <rect x="12" y="22" width="2" height="2" fill="#00f5ff" opacity="0.6"/>
    <rect x="15" y="22" width="2" height="2" fill="#00f5ff"/>
    <rect x="18" y="22" width="2" height="2" fill="#00f5ff" opacity="0.4"/>
    <!-- Port slots -->
    <rect x="9"  y="24" width="3" height="1" fill="#001828"/>
    <rect x="13" y="24" width="3" height="1" fill="#001828"/>
    <rect x="17" y="24" width="3" height="1" fill="#001828"/>

    <!-- ── Atmospheric scan lines (bottom) ────────────────────────────── -->
    <rect x="4" y="28" width="24" height="1" fill="#00f5ff" opacity="0.12"/>
    <rect x="4" y="30" width="24" height="1" fill="#00f5ff" opacity="0.07"/>
  </g>
</svg>
