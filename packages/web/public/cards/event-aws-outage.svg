<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background: deep purple-black (failed cloud) -->
  <rect width="160" height="100" fill="#0a0014"/>

  <!-- Drawing area: 100x100 square centered (30px margin each side) -->
  <g transform="translate(30,0) scale(3.125)">
    <!-- ── Cloud silhouette: provider offline ─────────────────────────── -->
    <!-- Left shoulder -->
    <rect x="4"  y="5" width="9"  height="4" fill="#3a2045"/>
    <!-- Right shoulder -->
    <rect x="19" y="4" width="9"  height="5" fill="#3a2045"/>
    <!-- Center peak -->
    <rect x="9"  y="1" width="14" height="8" fill="#3a2045"/>
    <!-- Bottom mass connecting shoulders -->
    <rect x="4"  y="7" width="24" height="2" fill="#3a2045"/>
    <!-- Top-edge highlights (subtle depth) -->
    <rect x="9"  y="1" width="14" height="1" fill="#5a3065"/>
    <rect x="4"  y="5" width="9"  height="1" fill="#5a3065"/>
    <rect x="19" y="4" width="9"  height="1" fill="#5a3065"/>

    <!-- ── Outage alert: warning ! overlaid on cloud ──────────────────── -->
    <!-- Bar -->
    <rect x="14" y="2" width="3" height="4" fill="#ff3b30"/>
    <!-- Dot -->
    <rect x="14" y="7" width="3" height="2" fill="#ff3b30"/>

    <!-- ── Redirected traffic: 3 amber streams pouring onto on-prem ───── -->
    <!-- Left stream (cx=6) -->
    <rect x="5"  y="11" width="2" height="3" fill="#ff9500"/>
    <rect x="4"  y="14" width="4" height="1" fill="#ff9500"/>
    <rect x="3"  y="15" width="6" height="1" fill="#ff9500"/>
    <rect x="4"  y="16" width="4" height="1" fill="#ff9500"/>
    <rect x="5"  y="17" width="2" height="1" fill="#ff9500"/>
    <!-- Center stream (cx=16, longer shaft) -->
    <rect x="15" y="10" width="2" height="4" fill="#ff9500"/>
    <rect x="14" y="14" width="4" height="1" fill="#ff9500"/>
    <rect x="13" y="15" width="6" height="1" fill="#ff9500"/>
    <rect x="14" y="16" width="4" height="1" fill="#ff9500"/>
    <rect x="15" y="17" width="2" height="1" fill="#ff9500"/>
    <!-- Right stream (cx=26) -->
    <rect x="25" y="11" width="2" height="3" fill="#ff9500"/>
    <rect x="24" y="14" width="4" height="1" fill="#ff9500"/>
    <rect x="23" y="15" width="6" height="1" fill="#ff9500"/>
    <rect x="24" y="16" width="4" height="1" fill="#ff9500"/>
    <rect x="25" y="17" width="2" height="1" fill="#ff9500"/>

    <!-- ── On-prem server rack: overwhelmed by redirected load ─────────── -->
    <!-- Isometric top face -->
    <polygon points="5,22 25,22 27,20 7,20" fill="#5a1a05"/>
    <!-- Isometric right side face -->
    <polygon points="25,22 27,20 27,30 25,30" fill="#3a1003"/>
    <!-- Front face -->
    <rect x="5" y="22" width="20" height="8" fill="#4a1506"/>
    <!-- Mounting ears -->
    <rect x="5"  y="22" width="2" height="8" fill="#3a1003"/>
    <rect x="23" y="22" width="2" height="8" fill="#3a1003"/>
    <!-- Overload highlight stripe along top edge -->
    <rect x="5" y="22" width="20" height="1" fill="#ff9500" opacity="0.5"/>
    <!-- Status LEDs: alternating amber/red — under serious strain -->
    <rect x="7"  y="25" width="2" height="2" fill="#ff9500"/>
    <rect x="10" y="25" width="2" height="2" fill="#ff453a"/>
    <rect x="13" y="25" width="2" height="2" fill="#ff9500"/>
    <rect x="16" y="25" width="2" height="2" fill="#ff453a"/>
    <rect x="19" y="25" width="2" height="2" fill="#ff9500"/>
    <!-- Port slots (bottom of front face) -->
    <rect x="7"  y="28" width="3" height="2" fill="#1a0802"/>
    <rect x="11" y="28" width="3" height="2" fill="#1a0802"/>
    <rect x="15" y="28" width="3" height="2" fill="#1a0802"/>
    <rect x="19" y="28" width="3" height="2" fill="#1a0802"/>

    <!-- ── Atmospheric amber glow at bottom ────────────────────────────── -->
    <rect x="3" y="31" width="26" height="1" fill="#ff9500" opacity="0.15"/>
  </g>
</svg>
