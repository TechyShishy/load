<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background: deep navy -->
  <rect width="160" height="100" fill="#001828"/>

  <!-- Drawing area: 32×32 virtual grid, centered -->
  <g transform="translate(30,0) scale(3.125)">

    <!-- ── Activation heatmap: 5 × 2 grid of model weight dots ───────── -->
    <!-- Each 2×2 dot represents a weight; opacity = activation strength  -->
    <!-- Row 1 (y=1–2) -->
    <rect x="2"  y="1" width="3" height="3" fill="#00f5ff" opacity="0.90"/>
    <rect x="8"  y="1" width="3" height="3" fill="#00f5ff" opacity="0.30"/>
    <rect x="14" y="1" width="3" height="3" fill="#00f5ff" opacity="0.70"/>
    <rect x="20" y="1" width="3" height="3" fill="#00f5ff" opacity="0.50"/>
    <rect x="26" y="1" width="3" height="3" fill="#00f5ff" opacity="1.00"/>
    <!-- Row 2 (y=6–8) -->
    <rect x="2"  y="6" width="3" height="3" fill="#00f5ff" opacity="0.40"/>
    <rect x="8"  y="6" width="3" height="3" fill="#00f5ff" opacity="1.00"/>
    <rect x="14" y="6" width="3" height="3" fill="#00f5ff" opacity="0.20"/>
    <rect x="20" y="6" width="3" height="3" fill="#00f5ff" opacity="0.80"/>
    <rect x="26" y="6" width="3" height="3" fill="#00f5ff" opacity="0.50"/>

    <!-- ── Down arrow: inference request entering GPU rack ────────────── -->
    <!-- Shaft (y=10–13) -->
    <rect x="15" y="10" width="2" height="4" fill="#00f5ff" opacity="0.75"/>
    <!-- Arrowhead (tip points down, y=14–16) -->
    <rect x="12" y="14" width="8" height="1" fill="#00f5ff"/>
    <rect x="13" y="15" width="6" height="1" fill="#00f5ff"/>
    <rect x="14" y="16" width="4" height="1" fill="#00f5ff"/>

    <!-- ── Isometric GPU server rack (y=16–25) ────────────────────────── -->
    <!-- Top face -->
    <polygon points="7,18 25,18 27,16 9,16" fill="#005577"/>
    <!-- Right side face -->
    <polygon points="25,18 27,16 27,25 25,25" fill="#002244"/>
    <!-- Front face -->
    <rect x="7" y="18" width="18" height="7" fill="#003355"/>
    <!-- Mounting ears -->
    <rect x="7"  y="18" width="2" height="7" fill="#002244"/>
    <rect x="23" y="18" width="2" height="7" fill="#002244"/>
    <!-- Top-edge highlight (full compute load) -->
    <rect x="7"  y="18" width="18" height="1" fill="#00f5ff" opacity="0.35"/>
    <!-- Status LEDs — all lit, inference running at capacity -->
    <rect x="9"  y="21" width="2" height="2" fill="#00f5ff"/>
    <rect x="12" y="21" width="2" height="2" fill="#00f5ff"/>
    <rect x="15" y="21" width="2" height="2" fill="#00f5ff"/>
    <rect x="18" y="21" width="2" height="2" fill="#00f5ff"/>
    <rect x="21" y="21" width="2" height="2" fill="#00f5ff"/>
    <!-- Port slots -->
    <rect x="9"  y="24" width="3" height="1" fill="#001828"/>
    <rect x="13" y="24" width="3" height="1" fill="#001828"/>
    <rect x="17" y="24" width="3" height="1" fill="#001828"/>

    <!-- ── Atmospheric scanlines ───────────────────────────────────────── -->
    <rect x="4" y="28" width="24" height="1" fill="#00f5ff" opacity="0.12"/>
    <rect x="4" y="30" width="24" height="1" fill="#00f5ff" opacity="0.07"/>

  </g>
</svg>
