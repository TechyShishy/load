<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="160" height="100" fill="#001505"/>

  <!-- 32×32 virtual grid, centered -->
  <g transform="translate(30,0) scale(3.125)">

    <!-- ── Top connection nodes ── -->
    <!-- Left node (degraded primary) -->
    <rect x="7" y="2" width="5" height="3" fill="#145520"/>
    <rect x="8" y="3" width="3" height="1" fill="#30d158" opacity="0.2"/>
    <!-- Right node (active redundant) -->
    <rect x="19" y="2" width="5" height="3" fill="#1a6b30"/>
    <rect x="20" y="3" width="3" height="1" fill="#30d158" opacity="0.9"/>

    <!-- ── Primary uplink shaft (dim — broken) ── -->
    <rect x="9" y="5" width="2" height="10" fill="#30d158" opacity="0.18"/>

    <!-- Break marker (red X) at mid-shaft -->
    <rect x="8"  y="8"  width="1" height="1" fill="#ff3b30" opacity="0.95"/>
    <rect x="11" y="8"  width="1" height="1" fill="#ff3b30" opacity="0.95"/>
    <rect x="9"  y="9"  width="2" height="1" fill="#ff3b30"/>
    <rect x="8"  y="10" width="1" height="1" fill="#ff3b30" opacity="0.95"/>
    <rect x="11" y="10" width="1" height="1" fill="#ff3b30" opacity="0.95"/>

    <!-- ── Redundant uplink shaft (bright — active) ── -->
    <rect x="21" y="5" width="2" height="10" fill="#30d158" opacity="0.85"/>
    <!-- Up-arrow tip at top of redundant shaft -->
    <rect x="22"  y="4" width="2" height="1" fill="#30d158"/>
    <rect x="21"  y="4" width="4" height="1" fill="#30d158" opacity="0.55"/>
    <!-- Pulse glow -->
    <rect x="20" y="8" width="4" height="2" fill="#30d158" opacity="0.22"/>

    <!-- ── Cross-link bridge connecting both shafts ── -->
    <rect x="10" y="12" width="12" height="1" fill="#30d158" opacity="0.5"/>
    <rect x="11" y="11" width="10" height="1" fill="#30d158" opacity="0.2"/>

    <!-- ── Router (isometric 3-face box) ── -->
    <!-- Top face -->
    <polygon points="4,17 28,17 30,15 6,15" fill="#1a6b30"/>
    <!-- Right side face -->
    <polygon points="28,17 30,15 30,26 28,26" fill="#0a3314"/>
    <!-- Front face -->
    <rect x="4" y="17" width="24" height="9" fill="#145520"/>
    <!-- Mounting ears -->
    <rect x="4"  y="17" width="2" height="9" fill="#0a3314"/>
    <rect x="26" y="17" width="2" height="9" fill="#0a3314"/>
    <!-- Top-edge highlight -->
    <rect x="4" y="17" width="24" height="1" fill="#30d158" opacity="0.35"/>
    <!-- Status LEDs: degraded / warning / ok / ok -->
    <rect x="7"  y="20" width="2" height="2" fill="#ff3b30"/>
    <rect x="11" y="20" width="2" height="2" fill="#ffd60a"/>
    <rect x="15" y="20" width="2" height="2" fill="#30d158"/>
    <rect x="20" y="20" width="2" height="2" fill="#30d158"/>
    <!-- Port slots -->
    <rect x="7"  y="23" width="3" height="2" fill="#001505"/>
    <rect x="12" y="23" width="3" height="2" fill="#001505"/>
    <rect x="17" y="23" width="3" height="2" fill="#001505"/>
    <rect x="22" y="23" width="3" height="2" fill="#001505"/>

    <!-- ── Downlink arrows (traffic exiting router) ── -->
    <!-- Left downlink (dim — primary path down) -->
    <rect x="9"  y="26" width="2" height="3" fill="#30d158" opacity="0.12"/>
    <!-- Right downlink (active — redundant path carrying load) -->
    <rect x="21" y="26" width="2" height="3" fill="#30d158" opacity="0.75"/>
    <!-- Downward arrowhead on right -->
    <rect x="20" y="29" width="4" height="1" fill="#30d158" opacity="0.75"/>
    <rect x="19" y="30" width="6" height="1" fill="#30d158" opacity="0.5"/>

    <!-- ── Atmospheric scanlines ── -->
    <rect x="4" y="28" width="5"  height="1" fill="#30d158" opacity="0.10"/>
    <rect x="4" y="30" width="24" height="1" fill="#30d158" opacity="0.10"/>

  </g>
</svg>
