<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background: 16:10 canvas -->
  <rect width="160" height="100" fill="#001505"/>

  <!-- Drawing area: 100×100 square centered (30px margin each side) -->
  <g transform="translate(30,0) scale(3.125)">
    <!-- Router: isometric top face -->
    <polygon points="3,9 27,9 29,7 5,7" fill="#1a6b30"/>
    <!-- Router: right side face -->
    <polygon points="27,9 29,7 29,20 27,20" fill="#0c4a1f"/>
    <!-- Router: front face -->
    <rect x="3" y="9" width="24" height="11" fill="#145520"/>

    <!-- Rack mounting ears -->
    <rect x="3"  y="9" width="2" height="11" fill="#0c4a1f"/>
    <rect x="25" y="9" width="2" height="11" fill="#0c4a1f"/>

    <!-- Status LEDs (6 ports — one amber for alert) -->
    <rect x="6"  y="12" width="2" height="2" fill="#30d158"/>
    <rect x="9"  y="12" width="2" height="2" fill="#30d158" opacity="0.35"/>
    <rect x="12" y="12" width="2" height="2" fill="#30d158"/>
    <rect x="15" y="12" width="2" height="2" fill="#ffd60a"/>
    <rect x="18" y="12" width="2" height="2" fill="#30d158"/>
    <rect x="21" y="12" width="2" height="2" fill="#30d158" opacity="0.6"/>

    <!-- Network port slots (bottom of front face) -->
    <rect x="6"  y="17" width="3" height="3" fill="#0a3810"/>
    <rect x="10" y="17" width="3" height="3" fill="#0a3810"/>
    <rect x="14" y="17" width="3" height="3" fill="#0a3810"/>
    <rect x="18" y="17" width="3" height="3" fill="#0a3810"/>
    <rect x="22" y="17" width="3" height="3" fill="#0a3810"/>

    <!-- Priority UP arrow (below router — symbolizes re-routing high-priority traffic) -->
    <!-- Arrowhead (tip at top, widens downward) -->
    <rect x="15" y="22" width="2" height="1" fill="#30d158"/>
    <rect x="14" y="23" width="4" height="1" fill="#30d158"/>
    <rect x="13" y="24" width="6" height="1" fill="#30d158"/>
    <rect x="11" y="25" width="10" height="1" fill="#30d158"/>
    <!-- Arrow stem -->
    <rect x="14" y="26" width="4" height="4" fill="#30d158" opacity="0.75"/>
  </g>
</svg>
