<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges">
  <!-- Background: 16:10 canvas -->
  <rect width="160" height="100" fill="#001828"/>

  <!-- Drawing area: 100×100 square centered (30px margin each side) -->
  <g transform="translate(30,0) scale(3.125)">
    <!-- Monitor: isometric top face -->
    <polygon points="4,8 26,8 28,6 6,6" fill="#005577"/>
    <!-- Monitor: right side face -->
    <polygon points="26,8 28,6 28,20 26,22" fill="#002244"/>
    <!-- Monitor: front face -->
    <rect x="4" y="8" width="22" height="14" fill="#003355"/>

    <!-- Screen bezel (near-black) -->
    <rect x="7" y="10" width="16" height="10" fill="#000e18"/>

    <!-- EQ bar ghost backgrounds (5 channels = 5K impression) -->
    <rect x="8"  y="10" width="2" height="10" fill="#00f5ff" opacity="0.13"/>
    <rect x="11" y="10" width="2" height="10" fill="#00f5ff" opacity="0.13"/>
    <rect x="14" y="10" width="2" height="10" fill="#00f5ff" opacity="0.13"/>
    <rect x="17" y="10" width="2" height="10" fill="#00f5ff" opacity="0.13"/>
    <rect x="20" y="10" width="2" height="10" fill="#00f5ff" opacity="0.13"/>

    <!-- EQ bars — active data (different heights = streaming EQ) -->
    <rect x="8"  y="14" width="2" height="6"  fill="#00f5ff"/>
    <rect x="11" y="12" width="2" height="8"  fill="#00f5ff"/>
    <rect x="14" y="16" width="2" height="4"  fill="#00f5ff"/>
    <rect x="17" y="13" width="2" height="7"  fill="#00f5ff"/>
    <rect x="20" y="15" width="2" height="5"  fill="#00f5ff"/>

    <!-- Top scanline highlight on screen -->
    <rect x="7" y="10" width="16" height="1" fill="#00f5ff" opacity="0.4"/>

    <!-- Monitor chin -->
    <rect x="4" y="22" width="22" height="1" fill="#004466"/>

    <!-- Stand neck -->
    <rect x="14" y="23" width="4" height="2" fill="#003355"/>
    <!-- Stand base -->
    <rect x="11" y="25" width="10" height="2" fill="#003355"/>
    <!-- Stand base top highlight -->
    <rect x="11" y="25" width="10" height="1" fill="#004466"/>
  </g>
</svg>
