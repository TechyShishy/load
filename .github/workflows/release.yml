name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build web
        run: yarn workspace @load/web build

      - name: Create web ZIP
        run: cd packages/web/dist && zip -r ../../../load-web-${{ github.ref_name }}.zip .

      - name: Upload web ZIP
        uses: actions/upload-artifact@v4
        with:
          name: web-zip
          path: load-web-${{ github.ref_name }}.zip

  build-electron:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build web
        run: yarn workspace @load/web build

      - name: Build Electron
        run: cd packages/electron && npx electron-builder --publish never

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: packages/electron/dist/*.AppImage

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: packages/electron/dist/*.exe

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: electron-macos
          path: packages/electron/dist/*.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build web
        run: yarn workspace @load/web build

      - name: Sync Capacitor Android
        run: cd packages/mobile && npx cap sync android

      - name: Make gradlew executable
        run: chmod +x packages/mobile/android/gradlew

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > packages/mobile/android/release.keystore

      - name: Build signed AAB
        run: cd packages/mobile/android && ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/packages/mobile/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Clean up keystore
        if: always()
        run: rm -f packages/mobile/android/release.keystore

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: packages/mobile/android/app/build/outputs/bundle/release/*.aab

  create-release:
    needs: [build-web, build-electron, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
