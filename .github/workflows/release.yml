name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build web
        run: yarn workspace @load/web build

      - name: Create web ZIP
        run: cd packages/web/dist && zip -r ../../../load-web-${{ github.ref_name }}.zip .

      - name: Upload web ZIP
        uses: actions/upload-artifact@v4
        with:
          name: web-zip
          path: load-web-${{ github.ref_name }}.zip

  build-electron:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build web
        run: yarn workspace @load/web build

      - name: Build Electron
        run: cd packages/electron && npx electron-builder --publish never

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: packages/electron/dist/*.AppImage

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: packages/electron/dist/*.exe

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: electron-macos
          path: packages/electron/dist/*.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build web
        run: yarn workspace @load/web build

      - name: Sync Capacitor Android
        run: yarn workspace @load/mobile exec cap sync android

      - name: Make gradlew executable
        run: chmod +x packages/mobile/android/gradlew

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > packages/mobile/android/release.keystore

      - name: Build signed AAB
        run: cd packages/mobile/android && ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/packages/mobile/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Clean up keystore
        if: always()
        run: rm -f packages/mobile/android/release.keystore

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: packages/mobile/android/app/build/outputs/bundle/release/*.aab

  create-release:
    needs: [build-web, build-electron, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true

  publish-itchio:
    needs: [build-web, build-electron]
    runs-on: ubuntu-latest
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-zip
          path: artifacts/web-zip

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-linux
          path: artifacts/electron-linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-windows
          path: artifacts/electron-windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-macos
          path: artifacts/electron-macos

      - name: Install butler
        run: |
          curl -L -o butler.zip https://github.com/itchio/butler/releases/latest/download/butler-linux-amd64.zip
          unzip butler.zip
          chmod +x linux-amd64/butler
          sudo mv linux-amd64/butler /usr/local/bin/butler
          butler -V

      - name: Resolve platform artifact paths
        run: |
          echo "LINUX_PKG=$(find artifacts/electron-linux -name '*.AppImage' | head -1)" >> "$GITHUB_ENV"
          echo "WINDOWS_PKG=$(find artifacts/electron-windows -name '*.exe' | head -1)" >> "$GITHUB_ENV"
          echo "MACOS_PKG=$(find artifacts/electron-macos -name '*.dmg' | head -1)" >> "$GITHUB_ENV"

      - name: Push HTML5 build to itch.io
        run: butler push "artifacts/web-zip/load-web-${{ github.ref_name }}.zip" techyshishy/load:html5 --userversion "${{ github.ref_name }}"
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push Linux build to itch.io
        run: butler push "${{ env.LINUX_PKG }}" techyshishy/load:linux --userversion "${{ github.ref_name }}"
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push Windows build to itch.io
        run: butler push "${{ env.WINDOWS_PKG }}" techyshishy/load:windows --userversion "${{ github.ref_name }}"
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push macOS build to itch.io
        run: butler push "${{ env.MACOS_PKG }}" techyshishy/load:osx --userversion "${{ github.ref_name }}"
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
