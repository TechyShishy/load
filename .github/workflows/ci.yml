name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests
        run: yarn test

      - name: Type check
        run: |
          yarn tsc -p packages/game-core/tsconfig.json
          yarn tsc --noEmit -p packages/web/tsconfig.json

      - name: Lint
        run: yarn lint

      - name: Build web package
        run: yarn workspace @load/web build
